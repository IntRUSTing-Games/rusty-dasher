[build]
target = "index.html"
dist = "dist"
public_url = "./"
# Prefer data-wasm-opt="0" in index.html — binaryen can break Table.grow

[watch]
ignore = ["dist", "screenshots", "target", "save_data.json"]

[serve]
addresses = ["127.0.0.1"]
# Unique default — not 8080 (often taken by other local apps).
port = 17880
open = false

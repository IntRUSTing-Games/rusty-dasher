name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: trunk build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (Bevy native build-deps occasionally pulled)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ pkg-config libx11-dev libasound2-dev libudev-dev \
            libwayland-dev libxkbcommon-dev binaryen

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-pages
          workspaces: ". -> target"

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build WASM site
        # Relative public_url (./) works under /rusty-dasher/ on project Pages
        run: trunk build --release
        env:
          # Keep peak memory down on free runners
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-C debuginfo=0"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
